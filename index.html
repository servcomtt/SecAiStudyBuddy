<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>SecAIPlus Study Buddy</title>
    <meta
      http-equiv="refresh"
      content="0; url=/content/study-spa/index.html"
    />
    <style>
      :root {
        color-scheme: light;
        font-family: "Segoe UI", system-ui, sans-serif;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: linear-gradient(180deg, #f7fbff 0%, #eef3f8 100%);
        color: #162033;
      }

      main {
        width: min(680px, calc(100vw - 48px));
        padding: 32px;
        border-radius: 20px;
        background: rgba(255, 255, 255, 0.92);
        border: 1px solid #d9e3ef;
        box-shadow: 0 18px 45px rgba(17, 34, 68, 0.08);
      }

      h1 {
        margin: 0 0 12px;
        font-size: 1.9rem;
      }

      p {
        margin: 0;
        line-height: 1.7;
        color: #5d6a7f;
      }

      a {
        color: #1a73e8;
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Opening SecAIPlus Study Buddy</h1>
      <p>
        Redirecting to the study app. If nothing happens,
        <a id="redirect-link" href="/content/study-spa/index.html">open it here</a>.
      </p>
    </main>

    <script>
      (function () {
        var target = "/content/study-spa/index.html" + window.location.search + window.location.hash;
        var link = document.getElementById("redirect-link");
        if (link) {
          link.href = target;
        }
        window.location.replace(target);
      })();
    </script>
  </body>
</html>
